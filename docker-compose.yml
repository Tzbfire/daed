services:
  daed:
    build:
      context: .
    image: daed:auto-reload
    container_name: daed
    privileged: true
    network_mode: host
    pid: host
    restart: always
    volumes:
      - /sys:/sys
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /home/liubai/docker/daed:/etc/daed
